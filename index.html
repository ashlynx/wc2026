<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PITCH26｜2026W杯 日程・放送・順位ガイド</title>
<meta name="description" content="2026 FIFAワールドカップ 日本語ガイド。全試合日程（日本時間）・放送/配信・日本代表・グループ順位を一覧。">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=16">
<style>
  .hero{padding:34px 0 6px}
  .eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .eyebrow .tag{font-family:"Saira Condensed";font-weight:800;font-size:13px;letter-spacing:.18em;color:var(--accent-ink);background:var(--accent);padding:3px 10px;border-radius:6px}
  .eyebrow .sub{font-size:12.5px;color:var(--muted)}
  .ticket{position:relative;overflow:hidden;border-radius:24px;background:radial-gradient(700px 240px at 50% -40%, rgba(255,180,46,.22), transparent 70%),linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line-2);box-shadow:var(--shadow)}
  .ticket::before,.ticket::after{content:"";position:absolute;top:-40%;width:160px;height:200%;background:linear-gradient(180deg,rgba(255,180,46,.16),transparent 70%);filter:blur(14px);pointer-events:none}
  .ticket::before{left:10%;transform:rotate(12deg)} .ticket::after{right:10%;transform:rotate(-12deg)}
  .ticket-grid{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;padding:30px 30px 24px}
  .team{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}.team.right{order:3}
  .team .flag{width:78px;height:78px;border-radius:50%;object-fit:cover;border:2px solid var(--line-2);box-shadow:0 8px 22px -10px rgba(0,0,0,.8)}
  .team .name{font-weight:900;font-size:19px}.team .rank{font-size:11px;color:var(--faint);font-family:"Space Mono"}.team.jp .name{color:var(--rose)}
  .center{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:148px}
  .kick-date{font-size:12px;color:var(--muted)}.kick-time{font-family:"Saira Condensed";font-weight:800;font-size:56px;line-height:.9}
  .kick-jst{font-size:11px;color:var(--accent);letter-spacing:.16em;font-weight:700}.kick-local{font-size:11px;color:var(--faint)}
  .ticket-foot{position:relative;display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:16px 30px;border-top:1px dashed var(--line-2)}
  .where{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .ticket-foot .chips{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
  .detail-link{font-weight:700;font-size:13.5px;color:var(--accent)}
  .cd{display:flex;justify-content:center;gap:10px;margin:18px 0 4px;flex-wrap:wrap}
  .cd .unit{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 16px;text-align:center;min-width:72px}
  .cd .unit b{display:block;font-family:"Saira Condensed";font-weight:800;font-size:30px;color:var(--accent)}
  .cd .unit span{font-size:10px;color:var(--muted);letter-spacing:.14em}
  .seemore{display:flex;justify-content:center;margin-top:6px}
  @media(max-width:820px){.kick-time{font-size:46px}.team .flag{width:62px;height:62px}.ticket-grid{padding:24px 18px 20px;gap:10px}}
</style>
</head>
<body>
<div id="chrome-header"></div>

<main class="wrap">
  <section class="hero">
    <div class="eyebrow"><span class="tag">NEXT MATCH</span><span class="sub" id="hero-sub"></span></div>
    <div id="hero-ticket"></div>
    <div class="cd"><div class="unit"><b id="cd-d">--</b><span>DAYS</span></div><div class="unit"><b id="cd-h">--</b><span>HOURS</span></div><div class="unit"><b id="cd-m">--</b><span>MINUTES</span></div><div class="unit"><b id="cd-s">--</b><span>SECONDS</span></div></div>
  </section>

  <section>
    <div class="sec-head"><span class="kicker">UP NEXT</span><h2>近日の試合</h2><div class="line"></div></div>
    <div id="upnext"></div>
    <div class="seemore"><a href="schedule.html" class="btn ghost">全104試合の日程を見る →</a></div>
  </section>

  <section id="howto"></section>

  <section id="watchlinks"></section>

  <section>
    <div class="sec-head"><span class="kicker">GROUP F</span><h2>日本のグループ</h2><div class="line"></div></div>
    <div id="groupF"></div>
    <div class="seemore"><a href="standings.html" class="btn ghost">全12グループの順位表を見る →</a></div>
  </section>
</main>

<div id="chrome-footer"></div>

<script src="data.js?v=16"></script>
<script src="app.js?v=16"></script>
<script>
  buildChrome("top");
  document.getElementById("howto").innerHTML=howToWatch();
  document.getElementById("watchlinks").innerHTML=watchLinks();

  function render(){
    // NEXT MATCH ヒーロー = 次の日本戦（無ければ次の注目試合）
    const nm = nextMatch(true) || nextMatch(false);
    const subEl=document.getElementById("hero-sub");
    if(subEl) subEl.textContent = nm ? (nm.jp?`グループ${nm.g}・日本代表 第${jpMatchNo(nm)}戦`:`グループ${nm.g}・次の注目試合`) : "グループステージ終了";
    const tEl=document.getElementById("hero-ticket"); if(tEl) tEl.innerHTML=heroTicket(nm);
    if(nm) startCountdown(matchDT(nm).toISOString());

    // 近日の試合 = これから行われる試合を日付順に3日分
    const now=Date.now();
    const up=MATCHES.filter(m=>m.g && matchDT(m).getTime()>now).sort((a,b)=>matchDT(a)-matchDT(b));
    const days=[...new Set(up.map(m=>m.d))].slice(0,3);
    let html="";
    days.forEach((d,di)=>{
      const list=up.filter(m=>m.d===d);
      html+=`<div class="daygroup"><div class="dayhead"><div class="daydate">${d}<small>${list[0].w}曜</small></div>${di===0?'<span class="nextflag">NEXT</span>':''}<span class="daycount">${list.length}試合</span></div>`;
      list.forEach((m,i)=>{html+=matchRow(m); if(di===0&&i===0) html+=prCard(0); if(di===1&&i===0) html+=prCard(1);});
      html+=`</div>`;
    });
    document.getElementById("upnext").innerHTML = html || '<p style="color:var(--muted);font-size:13px">表示できる予定試合がありません。</p>';
    document.getElementById("groupF").innerHTML=standingsTable("F");
  }
  bootstrap(render);
</script>
</body>
</html>
